<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Pressure Calculator | Metric Physique Hub</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/calculator.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo"><a href="../../index.html"><img src="../../assets/images/logo.png" alt="Logo"></a></div>
        <nav class="nav-container">
            <ul class="nav-links">
                <li><a href="../../bodybuilding/index.html">Bodybuilding</a></li>
                <li><a href="../../muscle-building/index.html">Muscle</a></li>
                <li><a href="../../weight-loss/index.html">Weight Loss</a></li>
                <li><a href="../index.html" style="color:var(--gold-primary)">Health</a></li>
                <li><a href="../../endurance/index.html">Endurance</a></li>
            </ul>
        </nav>
        <div class="special-links"><a href="#" class="btn-gold-outline">Coaching</a><a href="#"
                class="btn-gold-outline">Elite Track</a></div>
    </header>

    <main>
        <section class="hero">
            <h1>Blood Pressure Analysis</h1>
            <p>Standardized classification for systolic and diastolic readings.</p>
        </section>
        <div class="calc-container">
            <div class="input-grid">
                <div class="input-group"><label>Systolic (Top Number)</label><input type="number" id="systolic"
                        placeholder="e.g. 120"></div>
                <div class="input-group"><label>Diastolic (Bottom Number)</label><input type="number" id="diastolic"
                        placeholder="e.g. 80"></div>
            </div>
            <button class="calc-btn" onclick="Formulas.bloodPressure()">Check Category</button>
            <div id="results-section" class="results-container">
                <div class="results-grid">
                    <div class="res-card"><span>Your Reading</span><strong id="res-reading"></strong></div>
                    <div class="res-card" style="grid-column: span 2;"><span>Classification</span><strong
                            id="res-category"></strong></div>
                </div>
                <div class="export-wrap"><button class="export-btn" onclick="submitToDatabase()">Sync to Sheets</button>
                </div>
            </div>
        </div>
    </main>
    <script src="../../assets/js/core.js"></script>
    <script src="../../assets/js/formulas.js"></script>
</body>

</html>
