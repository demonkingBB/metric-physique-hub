<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waist-to-Height Ratio | Metric Physique Hub</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/calculator.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo"><a href="../../index.html"><img src="../../assets/images/logo.png" alt="Logo"></a></div>
        <nav class="nav-container">
            <ul class="nav-links">
                <li><a href="../../bodybuilding/index.html">Bodybuilding</a></li>
                <li><a href="../../muscle-building/index.html">Muscle</a></li>
                <li><a href="../index.html" style="color:var(--gold-primary)">Weight Loss</a></li>
                <li><a href="../../health/index.html">Health</a></li>
                <li><a href="../../endurance/index.html">Endurance</a></li>
            </ul>
        </nav>
        <div class="special-links">
            <a href="#" class="btn-gold-outline">Coaching</a>
            <a href="#" class="btn-gold-outline">Elite Track</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Waist-to-Height Ratio</h1>
            <p>A more accurate metabolic health marker than BMI.</p>
        </section>
        <div class="calc-container">
            <div class="input-grid">
                <div class="input-group"><label>Waist (Inches)</label><input type="number" id="waist"></div>
                <div class="input-group"><label>Height (Inches)</label><input type="number" id="height"></div>
            </div>
            <button class="calc-btn" onclick="Formulas.waistToHeight()">Check Health Ratio</button>
            <div id="results-section" class="results-container">
                <div class="results-grid">
                    <div class="res-card"><span>Ratio</span><strong id="res-ratio"></strong></div>
                    <div class="res-card"><span>Status</span><strong id="res-status"></strong></div>
                    <div class="res-card"><span>Ideal Waist</span><strong id="res-idealWaist"></strong></div>
                </div>
                <div class="export-wrap"><button class="export-btn" onclick="submitToDatabase()">Sync to Sheets</button>
                    <p id="status-msg" class="status-msg"></p>
                </div>
            </div>
        </div>
    </main>
    <script src="../../assets/js/core.js"></script>
    <script src="../../assets/js/formulas.js"></script>
</body>

</html>
