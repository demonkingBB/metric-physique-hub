<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Loss Timeline | Metric Physique Hub</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/calculator.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo"><a href="../../index.html"><img src="../../assets/images/logo.png" alt="Logo"></a></div>
        <nav class="nav-container">
            <ul class="nav-links">
                <li><a href="../../bodybuilding/index.html">Bodybuilding</a></li>
                <li><a href="../../muscle-building/index.html">Muscle</a></li>
                <li><a href="../index.html" style="color:var(--gold-primary)">Weight Loss</a></li>
                <li><a href="../../health/index.html">Health</a></li>
                <li><a href="../../endurance/index.html">Endurance</a></li>
            </ul>
        </nav>
        <div class="special-links"><a href="https://demonkingbb.github.io/fitscience/"
                class="btn-gold-outline">Coaching</a><a href="https://fitnesstracker-kappa-plum.vercel.app/"
                class="btn-gold-outline">Elite Track</a></div>
    </header>

    <main>
        <section class="hero">
            <h1>Loss Timeline</h1>
            <p>Predict your success date based on current caloric deficit.</p>
        </section>
        <div class="calc-container">
            <div class="input-grid">
                <div class="input-group"><label>Current Weight (lbs)</label><input type="number" id="weight-now"></div>
                <div class="input-group"><label>Goal Weight (lbs)</label><input type="number" id="weight-goal"></div>
                <div class="input-group"><label>Daily Deficit (kcal)</label><input type="number" id="daily-deficit"
                        placeholder="e.g. 500"></div>
            </div>
            <button class="calc-btn" onclick="Formulas.lossTimeline()">Predict Timeline</button>
            <div id="results-section" class="results-container">
                <div class="results-grid">
                    <div class="res-card"><span>Total Loss</span><strong id="res-totalToLose"></strong></div>
                    <div class="res-card"><span>Weeks to Goal</span><strong id="res-weeks"></strong></div>
                    <div class="res-card"><span>Days to Goal</span><strong id="res-days"></strong></div>
                </div>
                <div class="export-wrap"><button class="export-btn" onclick="submitToDatabase()">Sync to Sheets</button>
                </div>
            </div>
        </div>
    </main>
    <script src="../../assets/js/core.js"></script>
    <script src="../../assets/js/formulas.js"></script>
</body>

</html>
