<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Deficit Calculator | Metric Physique Hub</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/calculator.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo"><a href="../../index.html"><img src="../../assets/images/logo.png" alt="Logo"></a></div>
        <nav class="nav-container">
            <ul class="nav-links">
                <li><a href="../../bodybuilding/index.html">Bodybuilding</a></li>
                <li><a href="../../muscle-building/index.html">Muscle</a></li>
                <li><a href="../index.html" style="color:var(--gold-primary)">Weight Loss</a></li>
                <li><a href="../../health/index.html">Health</a></li>
                <li><a href="../../endurance/index.html">Endurance</a></li>
            </ul>
        </nav>
        <div class="special-links">
            <a href="#" class="btn-gold-outline">Coaching</a>
            <a href="#" class="btn-gold-outline">Elite Track</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Calorie Deficit Plan</h1>
            <p>Define your daily intake based on your loss goals.</p>
        </section>
        <div class="calc-container">
            <div class="input-grid">
                <div class="input-group"><label>Your TDEE (kcal)</label><input type="number" id="tdee-input"></div>
                <div class="input-group">
                    <label>Target Loss per Week</label>
                    <select id="loss-rate" class="custom-select"
                        style="background:#000; color:white; padding:12px; border:1px solid #262626;">
                        <option value="0.5">0.5 lbs (Lean)</option>
                        <option value="1.0" selected>1.0 lbs (Moderate)</option>
                        <option value="2.0">2.0 lbs (Aggressive)</option>
                    </select>
                </div>
            </div>
            <button class="calc-btn" onclick="Formulas.calorieDeficit()">Calculate Deficit</button>
            <div id="results-section" class="results-container">
                <div class="results-grid">
                    <div class="res-card"><span>Daily Target</span><strong id="res-targetIntake"></strong></div>
                    <div class="res-card"><span>Weekly Loss</span><strong id="res-weeklyLoss"></strong></div>
                    <div class="res-card"><span>Daily Deficit</span><strong id="res-dailyDeficit"></strong></div>
                </div>
                <div class="export-wrap"><button class="export-btn" onclick="submitToDatabase()">Sync to Sheets</button>
                </div>
            </div>
        </div>
    </main>
    <script src="../../assets/js/core.js"></script>
    <script src="../../assets/js/formulas.js"></script>
</body>

</html>
