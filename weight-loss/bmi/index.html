<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator | Metric Physique Hub</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/calculator.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

    <header>
        <div class="logo"><a href="../../index.html"><img src="../../assets/images/logo.png" alt="Logo"></a></div>
        <nav class="nav-container">
            <ul class="nav-links">
                <li><a href="../../bodybuilding/index.html">Bodybuilding</a></li>
                <li><a href="../../muscle-building/index.html">Muscle</a></li>
                <li><a href="../index.html" style="color:var(--gold-primary)">Weight Loss</a></li>
                <li><a href="../../health/index.html">Health</a></li>
                <li><a href="../../endurance/index.html">Endurance</a></li>
            </ul>
        </nav>
        <div class="special-links">
            <a href="https://demonkingbb.github.io/fitscience/" class="btn-gold-outline">Coaching</a>
            <a href="https://fitnesstracker-kappa-plum.vercel.app/" class="btn-gold-outline">Elite Track</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>BMI Calculator</h1>
            <p>Standard Body Mass Index measurement for weight classification.</p>
        </section>

        <div class="calc-container">
            <div class="input-grid">
                <div class="input-group"><label>Weight (lbs)</label><input type="number" id="weight"></div>
                <div class="input-group"><label>Height (Inches)</label><input type="number" id="height"></div>
            </div>

            <button class="calc-btn" onclick="Formulas.bmi()">Calculate BMI</button>

            <div id="results-section" class="results-container">
                <div class="results-grid">
                    <div class="res-card"><span>BMI Score</span><strong id="res-bmi"></strong></div>
                    <div class="res-card"><span>Category</span><strong id="res-category"></strong></div>
                </div>
                <div class="export-wrap">
                    <button class="export-btn" onclick="submitToDatabase()">Sync to Sheets</button>
                    <p id="status-msg" class="status-msg"></p>
                </div>
            </div>
        </div>
    </main>

    <script src="../../assets/js/core.js"></script>
    <script src="../../assets/js/formulas.js"></script>
</body>

</html>
